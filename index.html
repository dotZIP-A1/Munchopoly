<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Clicker Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 id="scoreText">Score: 0</h2>

    <!-- cool text -->
    <p>Click the food to earn points. They will move when clicked!</p>

    <!-- Image Sources -->
    <img src="resources/gfx/bread.png" id="breadImage" alt="Bread">
    <img src="resources/gfx/knife.png" id="knifeImage" alt="Knife">
    <img src="resources/gfx/chickenleg.png" id="chickenLegImage" alt="Chicken Leg">

    <!-- Audio Sources -->
    <audio id="clickSound" src="resources/audio/click.wav" preload="auto"></audio>
    <audio id="backgroundMusic" src="resources/audio/backgroundmusic.ogg" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
