<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munchopoly</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 id="scoreText">Score: 0</h2>

    <p>Click the food to earn points. They will move when clicked!</p>

    <!-- FOOD -->
    <img src="resources/gfx/bread.png" id="breadImage" class="food" alt="Bread">
    <img src="resources/gfx/knife.png" id="knifeImage" class="food" alt="Knife">
    <img src="resources/gfx/chickenleg.png" id="chickenLegImage" class="food" alt="Chicken Leg">
    <img src="resources/gfx/pizza.png" id="pizzaImage" class="food" alt="Pizza">

    <!-- UI -->
    <img src="resources/gfx/shopbutton.png" id="shopButtonImage" alt="Shop Button">

    <div id="shopMenu" class="hidden">
        <h3>Shop</h3>
        <button id="upgradeClick">Upgrade Click (+1) — Cost: 20</button>
        <p>Increase your click power!</p>
    </div>

    <!-- AUDIO -->
    <audio id="clickSound" src="resources/audio/click.wav" preload="auto"></audio>
    <audio id="backgroundMusic" src="resources/audio/backgroundmusic.ogg" preload="auto"></audio>
    <audio id="goldenRushBackgroundMusic" src="resources/audio/goldenrush.ogg" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
